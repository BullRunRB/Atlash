<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>ATLASH</title>
  <script>
    // GitHub Pages 404 → SPA redirect
    const path = window.location.pathname;
    const parts = path.split('/').filter(Boolean);
    const repo = parts.length && !['dashboard','admin'].includes(parts[0]) ? '/' + parts[0] : '';
    if (path.includes('/dashboard')) {
      window.location.replace(repo + '/dashboard/');
    } else if (path.includes('/admin')) {
      window.location.replace(repo + '/admin/');
    } else {
      window.location.replace(repo + '/');
    }
  </script>
</head>
<body></body>
</html>
